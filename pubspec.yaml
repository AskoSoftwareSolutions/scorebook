name: scoring_count
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.0


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  # State Management & Routing
  get: ^4.6.6

  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.12.0

  # File Sharing
  share_plus: ^7.2.2

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  intl: ^0.19.0

  # Utilities
  uuid: ^4.3.3
  shared_preferences: ^2.2.3

  # ── Firebase (Online Mode) ────────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_database: ^11.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_messaging: ^15.1.0    # ← ADD: FCM push notifications
  firebase_storage: ^12.2.0      # ← ADD: team logo upload

  # ── Image picker (for team logos) ─────────────────────────────────────────
  image_picker: ^1.1.2            # ← ADD: pick logo from gallery/camera

  # ── Ads ───────────────────────────────────────────────────────────────────
  google_mobile_ads: ^5.1.0

  # ── Payment ───────────────────────────────────────────────────────────────
  razorpay_flutter: ^1.3.7

  # ── Package Info ──────────────────────────────────────────────────────────
  package_info_plus: ^8.0.0

  # ── URL Launcher ──────────────────────────────────────────────────────────
  url_launcher: ^6.3.0

  # ── Deep Links ────────────────────────────────────────────────────────────
  # Handles: cricketscorer://live/{matchCode}
  # Android: AndroidManifest.xml intent-filter
  # iOS:     Xcode URL Schemes
  app_links: ^6.1.1







flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_icon.png"

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:

  uses-material-design: true
  assets:
    - assets/
    - assets/logo/logo_round.png
    - assets/logo/app_icon.png

